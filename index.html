<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="theme-switch-wrapper">
            <button id="theme-toggle">Dark Mode</button>
        </div>
        <h1>Lotto Number Generator</h1>
    </header>
    <main>
        <div class="lotto-container">
            <h2>Your Lucky Numbers</h2>
            <div id="lotto-numbers" class="lotto-numbers">
                <!-- Lotto numbers will be inserted here -->
            </div>
            <button id="generate-btn">Generate Numbers</button>
        </div>
        
        <div style="margin-top: 3rem;">
            <a href="resume/index.html" style="text-decoration: none;">
                <button style="background-color: #0D47A1; color: white; padding: 1rem 2rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 700;">
                    신규 프로젝트: 이력서 분석기 보러가기 →
                </button>
            </a>
        </div>
    </main>
    <section class="partnership-section">
        <div class="partnership-container">
            <h2>제휴 문의 (Partnership)</h2>
            <p>로또 번호 생성기 관련 제휴 및 문의 사항을 남겨주세요.</p>
            <form action="https://formspree.io/f/xdalvqvl" method="POST" id="partnership-form">
                <div class="input-group">
                    <label for="name">성함/업체명</label>
                    <input type="text" id="name" name="name" placeholder="홍길동" required>
                </div>
                <div class="input-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
                </div>
                <div class="input-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="4" placeholder="문의 내용을 입력해주세요." required></textarea>
                </div>
                <!-- Formspree settings -->
                <input type="hidden" name="_subject" value="새로운 제휴 문의가 접수되었습니다!">
                <button type="submit" id="submit-btn">문의 보내기</button>
            </form>
            <p class="form-hint">* 'YOUR_FORMSPREE_ID' 부분을 실제 Formspree ID로 변경해야 작동합니다.</p>
        </div>
    </section>
    <section class="comments-section">
        <div class="comments-container">
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                
                var disqus_config = function () {
                this.page.url = 'https://yoyopapamon.github.io/king/';  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = 'king-lotto-main'; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://yoyopapa.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </section>
    <footer>
        <p>&copy; 2023 Modern Lotto. All rights reserved.</p>
    </footer>
    <script src="main.js"></script>
</body>
</html>
